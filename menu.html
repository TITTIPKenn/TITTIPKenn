menu.forEach(section=>{
  section.items.forEach(item=>{
    let card = document.createElement("div");
    card.className="card";

    if(item.R){
      card.innerHTML = `
        <h3>${item.name}</h3>
        <div class="harga">R ${item.R} | L ${item.L}</div>
        <button onclick="tambah('${item.name}',${item.R},'R')">R</button>
        <button onclick="tambah('${item.name}',${item.L},'L')">L</button>
      `;
    } else {
      card.innerHTML = `
        <h3>${item.name}</h3>
        <div class="harga">Rp ${item.price}</div>
        <button onclick="tambah('${item.name}',${item.price})">+ Tambah</button>
      `;
    }

    box.appendChild(card);
  });
});
